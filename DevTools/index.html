<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>开发者工具箱 - DevToolKit</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="sidebar-logo">🧰</span>
            <span class="sidebar-title">DevToolKit</span>
        </div>
        <div class="sidebar-search">
            <input type="text" id="toolSearch" placeholder="搜索工具..." autocomplete="off">
        </div>
        <div class="sidebar-nav" id="sidebarNav"></div>
        <div class="sidebar-footer">
            <button class="btn-theme" id="themeBtn" title="切换主题">🌙</button>
            <span class="footer-text">按 <kbd>/</kbd> 搜索</span>
        </div>
    </nav>

    <button class="menu-toggle" id="menuToggle">☰</button>

    <main class="main" id="main">
        <!-- 首页 -->
        <div class="home-view" id="homeView">
            <div class="home-hero">
                <h1>🧰 开发者工具箱</h1>
                <p>常用开发工具集合，一个页面搞定所有碎片需求</p>
            </div>
            <div id="homeGrid"></div>
        </div>

        <!-- 工具面板容器 -->
        <div class="tool-view" id="toolView" style="display:none">
            <div class="tool-header">
                <button class="btn-back" id="btnBack">← 返回</button>
                <h2 id="toolTitle"></h2>
            </div>
            <div class="tool-body" id="toolBody"></div>
        </div>
    </main>

    <div class="toast" id="toast"></div>

    <script src="app.js"></script>
</body>
</html>
