<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>PhotoCraft — 图片编辑器</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="logo">
      <span class="logo-icon">✦</span>
      <span class="logo-text">PhotoCraft</span>
    </div>
    <nav class="header-nav">
      <button class="nav-btn active" id="btn-editor" onclick="showPage('editor')">编辑器</button>
      <button class="nav-btn" id="btn-history" onclick="showPage('history')">历史记录</button>
    </nav>
  </header>

  <!-- Editor Page -->
  <main class="page" id="page-editor">
    <!-- Upload Zone -->
    <div class="upload-zone" id="uploadZone">
      <div class="upload-content">
        <div class="upload-icon">⬆</div>
        <p class="upload-title">拖拽或点击上传图片</p>
        <p class="upload-sub">支持 JPG、PNG、WEBP</p>
        <input type="file" id="fileInput" accept="image/*" hidden />
        <button class="btn-primary" onclick="document.getElementById('fileInput').click()">选择图片</button>
      </div>
    </div>

    <!-- Editor Layout -->
    <div class="editor-layout" id="editorLayout" style="display:none">
      <!-- Left Panel -->
      <aside class="panel-left">
        <div class="panel-tabs">
          <button class="tab-btn active" onclick="switchTab('adjust')">调节</button>
          <button class="tab-btn" onclick="switchTab('filter')">滤镜</button>
          <button class="tab-btn" onclick="switchTab('text')">文字</button>
          <button class="tab-btn" onclick="switchTab('sticker')">贴纸</button>
          <button class="tab-btn" onclick="switchTab('theme')">主题</button>
        </div>

        <!-- Adjust Tab -->
        <div class="tab-content active" id="tab-adjust">
          <button class="btn-auto-adjust" onclick="autoAdjust()">⚡ 自动调节</button>
          <div class="slider-group">
            <label>亮度 <span id="val-brightness">0</span></label>
            <input type="range" min="-100" max="100" value="0" id="brightness" onmousedown="onSliderMouseDown()" oninput="applyAdjust()" onchange="commitAdjust()" />
          </div>
          <div class="slider-group">
            <label>对比度 <span id="val-contrast">0</span></label>
            <input type="range" min="-100" max="100" value="0" id="contrast" onmousedown="onSliderMouseDown()" oninput="applyAdjust()" onchange="commitAdjust()" />
          </div>
          <div class="slider-group">
            <label>阴影 <span id="val-shadows">0</span></label>
            <input type="range" min="-100" max="100" value="0" id="shadows" onmousedown="onSliderMouseDown()" oninput="applyAdjust()" onchange="commitAdjust()" />
          </div>
          <div class="slider-group">
            <label>高光 <span id="val-highlights">0</span></label>
            <input type="range" min="-100" max="100" value="0" id="highlights" onmousedown="onSliderMouseDown()" oninput="applyAdjust()" onchange="commitAdjust()" />
          </div>
          <div class="slider-group">
            <label>鲜明度 <span id="val-vibrance">0</span></label>
            <input type="range" min="-100" max="100" value="0" id="vibrance" onmousedown="onSliderMouseDown()" oninput="applyAdjust()" onchange="commitAdjust()" />
          </div>
          <div class="slider-group">
            <label>饱和度 <span id="val-saturation">0</span></label>
            <input type="range" min="-100" max="100" value="0" id="saturation" onmousedown="onSliderMouseDown()" oninput="applyAdjust()" onchange="commitAdjust()" />
          </div>
        </div>

        <!-- Filter Tab -->
        <div class="tab-content" id="tab-filter">
          <div class="filter-grid" id="filterGrid"></div>
        </div>

        <!-- Text Tab -->
        <div class="tab-content" id="tab-text">
          <div class="text-controls">
            <input type="text" id="textInput" placeholder="输入文字..." class="text-field" />

            <!-- Preset styles -->
            <div class="preset-label">预设样式</div>
            <div class="text-preset-grid" id="textPresetGrid"></div>

            <div class="color-row">
              <label>颜色</label>
              <input type="color" id="textColor" value="#ffffff" />
            </div>
            <div class="slider-group">
              <label>字号 <span id="val-fontSize">32</span></label>
              <input type="range" min="12" max="120" value="32" id="fontSize" oninput="document.getElementById('val-fontSize').textContent=this.value" />
            </div>
            <div class="font-select-row">
              <label>字体</label>
              <select id="fontFamily" class="select-field">
                <option value="Inter">Inter</option>
                <option value="serif">衬线体</option>
                <option value="monospace">等宽体</option>
                <option value="cursive">手写体</option>
              </select>
            </div>
            <div class="text-style-row">
              <button class="style-toggle-btn" id="btn-bold" onclick="toggleTextStyle('bold')" title="粗体">B</button>
              <button class="style-toggle-btn italic-btn" id="btn-italic" onclick="toggleTextStyle('italic')" title="斜体">I</button>
              <button class="style-toggle-btn" id="btn-shadow" onclick="toggleTextStyle('shadow')" title="阴影">S</button>
              <button class="style-toggle-btn" id="btn-stroke" onclick="toggleTextStyle('stroke')" title="描边">O</button>
            </div>
            <button class="btn-primary full-width" onclick="addText()">添加文字</button>
          </div>
        </div>

        <!-- Sticker Tab -->
        <div class="tab-content" id="tab-sticker">
          <div class="sticker-grid" id="stickerGrid"></div>
        </div>

        <!-- Theme Tab -->
        <div class="tab-content" id="tab-theme">
          <p class="theme-desc">一键应用预设主题风格</p>
          <div class="theme-grid" id="themeGrid"></div>
        </div>
      </aside>

      <!-- Canvas Area -->
      <section class="canvas-area">
        <div class="canvas-toolbar">
          <button class="tool-btn" id="cropBtn" onclick="toggleCrop()" title="裁剪">✂ 裁剪</button>
          <button class="tool-btn" onclick="resetAll()" title="重置">↺ 重置</button>
          <button class="tool-btn" onclick="undoAction()" title="撤销">⟵ 撤销</button>
          <button class="tool-btn" onclick="reloadImage()" title="重新导入">📂 换图</button>
          <input type="file" id="reloadInput" accept="image/*" hidden />
          <div class="spacer"></div>
          <button class="btn-primary" onclick="saveImage()">💾 保存</button>
        </div>
        <div class="canvas-wrapper" id="canvasWrapper">
          <canvas id="mainCanvas"></canvas>
          <div class="overlay-layer" id="overlayLayer"></div>
          <!-- Crop overlay -->
          <div class="crop-overlay" id="cropOverlay" style="display:none">
            <div class="crop-box" id="cropBox">
              <div class="crop-handle tl" data-handle="tl"></div>
              <div class="crop-handle tr" data-handle="tr"></div>
              <div class="crop-handle bl" data-handle="bl"></div>
              <div class="crop-handle br" data-handle="br"></div>
            </div>
            <div class="crop-actions">
              <button class="btn-primary" onclick="applyCrop()">应用裁剪</button>
              <button class="btn-ghost" onclick="cancelCrop()">取消</button>
            </div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <!-- History Page -->
  <main class="page" id="page-history" style="display:none">
    <div class="history-header">
      <h2>历史记录</h2>
      <button class="btn-ghost" onclick="clearHistory()">清空全部</button>
    </div>
    <div class="history-grid" id="historyGrid">
      <div class="history-empty">暂无历史记录</div>
    </div>
  </main>

  <!-- Save Modal (mobile) -->
  <div class="save-modal" id="saveModal">
    <div class="save-modal-backdrop" onclick="closeSaveModal()"></div>
    <div class="save-modal-content">
      <img class="save-modal-img" id="saveModalImg" src="" alt="保存预览" />
      <p class="save-modal-hint" id="saveModalHint"></p>
      <div class="save-modal-actions">
        <a id="saveModalLink" class="btn-primary" style="text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center;">⬇ 下载图片</a>
        <button class="btn-ghost" onclick="closeSaveModal()">关闭</button>
      </div>
    </div>
  </div>

  <script src="filters.js"></script>
  <script src="stickers.js"></script>
  <script src="app.js"></script>
</body>
</html>
