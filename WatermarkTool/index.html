<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水印工坊 | WATERMARK LAB</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="cyber-grid"></div>
    <div class="scan-line"></div>

    <header class="header">
        <div class="logo">
            <span class="logo-icon">◈</span>
            <h1>水印工坊 <span class="logo-sub">WATERMARK LAB</span></h1>
        </div>
        <div class="header-deco">
            <span class="blink">●</span> SYS.ONLINE
        </div>
    </header>

    <main class="main-container">
        <!-- 模式切换 -->
        <div class="mode-switch">
            <button class="mode-btn active" data-mode="remove">
                <span class="mode-icon">⊘</span>
                <span class="mode-label">去除水印</span>
                <span class="mode-tag">REMOVE</span>
            </button>
            <button class="mode-btn" data-mode="add">
                <span class="mode-icon">⊕</span>
                <span class="mode-label">添加水印</span>
                <span class="mode-tag">EMBED</span>
            </button>
        </div>

        <!-- 上传区域 -->
        <div class="upload-zone" id="uploadZone">
            <div class="upload-inner">
                <div class="upload-icon">
                    <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
                        <rect x="2" y="2" width="60" height="60" rx="4" stroke="currentColor" stroke-width="2" stroke-dasharray="6 4"/>
                        <path d="M32 20v24M20 32h24" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                    </svg>
                </div>
                <p class="upload-text">拖拽图片到此处 或 <span class="upload-link">点击上传</span></p>
                <p class="upload-hint">支持 JPG / PNG / WebP，最大 20MB</p>
            </div>
            <input type="file" id="fileInput" accept="image/*" hidden>
        </div>

        <!-- 工作区 - 去水印 -->
        <div class="workspace" id="workspace" style="display:none;">
            <div class="workspace-header">
                <div class="ws-info">
                    <span class="ws-filename" id="fileName">image.jpg</span>
                    <span class="ws-size" id="fileSize">1920×1080</span>
                </div>
                <div class="ws-actions">
                    <button class="cyber-btn sm" id="btnReupload">重新上传</button>
                </div>
            </div>

            <!-- 去水印面板 -->
            <div class="panel-remove" id="panelRemove">
                <div class="canvas-area">
                    <div class="canvas-wrapper" id="canvasWrapper">
                        <div class="canvas-inner" id="canvasInner">
                            <canvas id="mainCanvas" class="main-cv"></canvas>
                            <canvas id="maskCanvas" class="mask-cv"></canvas>
                            <div class="selection-box" id="selectionBox" style="display:none;"></div>
                        </div>
                    </div>
                </div>
                <div class="tool-sidebar">
                    <h3 class="sidebar-title">◆ 去水印工具</h3>

                    <div class="tool-section">
                        <label class="tool-label">自动检测</label>
                        <button class="cyber-btn full" id="btnAutoDetect">
                            <span class="btn-icon">⟐</span> 自动定位水印
                        </button>
                        <p class="tool-hint">自动分析图片中的半透明文字水印</p>
                    </div>

                    <div class="tool-section">
                        <label class="tool-label">手动选择</label>
                        <button class="cyber-btn full outline" id="btnManualSelect">
                            <span class="btn-icon">▣</span> 框选水印区域
                        </button>
                        <p class="tool-hint">按住鼠标拖动框选水印位置</p>
                    </div>

                    <div class="tool-section">
                        <label class="tool-label">画笔涂抹</label>
                        <div class="brush-controls">
                            <button class="cyber-btn full outline" id="btnBrush">
                                <span class="btn-icon">✎</span> 画笔模式
                            </button>
                            <div class="slider-group">
                                <span>画笔大小</span>
                                <input type="range" id="brushSize" min="5" max="80" value="20" class="cyber-slider">
                                <span id="brushSizeVal">20px</span>
                            </div>
                        </div>
                    </div>

                    <div class="tool-section">
                        <label class="tool-label">修复强度</label>
                        <div class="slider-group">
                            <input type="range" id="inpaintStrength" min="1" max="10" value="6" class="cyber-slider">
                            <span id="strengthVal">6</span>
                        </div>
                    </div>

                    <div class="detected-regions" id="detectedRegions" style="display:none;">
                        <label class="tool-label">检测到的水印区域</label>
                        <div id="regionList"></div>
                    </div>

                    <div class="action-buttons">
                        <button class="cyber-btn full primary" id="btnInpaint" disabled>
                            <span class="btn-icon">◈</span> 执行去除
                        </button>
                        <button class="cyber-btn full" id="btnReset">
                            <span class="btn-icon">↺</span> 重置
                        </button>
                        <button class="cyber-btn full success" id="btnDownloadRemove" disabled>
                            <span class="btn-icon">↓</span> 下载结果
                        </button>
                    </div>
                </div>
            </div>

            <!-- 加水印面板 -->
            <div class="panel-add" id="panelAdd" style="display:none;">
                <div class="canvas-area">
                    <div class="canvas-wrapper" id="canvasWrapperAdd">
                        <div class="canvas-inner">
                            <canvas id="addCanvas" class="main-cv"></canvas>
                        </div>
                    </div>
                </div>
                <div class="tool-sidebar">
                    <h3 class="sidebar-title">◆ 添加水印</h3>

                    <div class="tool-section">
                        <label class="tool-label">水印文字</label>
                        <input type="text" id="wmText" class="cyber-input" placeholder="输入水印内容..." value="SAMPLE">
                    </div>

                    <div class="tool-section">
                        <label class="tool-label">字体样式</label>
                        <div class="font-options" id="fontOptions">
                            <button class="font-btn active" data-font="Orbitron" style="font-family:Orbitron">Cyber</button>
                            <button class="font-btn" data-font="Rajdhani" style="font-family:Rajdhani">Tech</button>
                            <button class="font-btn" data-font="Noto Sans SC" style="font-family:'Noto Sans SC'">黑体</button>
                            <button class="font-btn" data-font="serif">宋体</button>
                            <button class="font-btn" data-font="cursive">手写</button>
                        </div>
                    </div>

                    <div class="tool-section">
                        <label class="tool-label">字体大小</label>
                        <div class="slider-group">
                            <input type="range" id="wmFontSize" min="12" max="120" value="36" class="cyber-slider">
                            <span id="wmFontSizeVal">36px</span>
                        </div>
                    </div>

                    <div class="tool-section">
                        <label class="tool-label">水印颜色</label>
                        <div class="color-row">
                            <input type="color" id="wmColor" value="#ffffff" class="cyber-color">
                            <label class="tool-label" style="margin:0">透明度</label>
                            <input type="range" id="wmOpacity" min="5" max="100" value="30" class="cyber-slider">
                            <span id="wmOpacityVal">30%</span>
                        </div>
                    </div>

                    <div class="tool-section">
                        <label class="tool-label">旋转角度</label>
                        <div class="slider-group">
                            <input type="range" id="wmRotation" min="-90" max="90" value="-30" class="cyber-slider">
                            <span id="wmRotationVal">-30°</span>
                        </div>
                    </div>

                    <div class="tool-section">
                        <label class="tool-label">水印模式</label>
                        <div class="wm-mode-options">
                            <button class="wm-mode-btn active" data-wm-mode="tile">平铺</button>
                            <button class="wm-mode-btn" data-wm-mode="single">单个</button>
                        </div>
                    </div>

                    <div class="tool-section" id="singlePosSection" style="display:none;">
                        <label class="tool-label">水印位置</label>
                        <div class="position-grid">
                            <button class="pos-btn" data-pos="top-left">↖</button>
                            <button class="pos-btn" data-pos="top-center">↑</button>
                            <button class="pos-btn" data-pos="top-right">↗</button>
                            <button class="pos-btn" data-pos="center-left">←</button>
                            <button class="pos-btn active" data-pos="center">●</button>
                            <button class="pos-btn" data-pos="center-right">→</button>
                            <button class="pos-btn" data-pos="bottom-left">↙</button>
                            <button class="pos-btn" data-pos="bottom-center">↓</button>
                            <button class="pos-btn" data-pos="bottom-right">↘</button>
                        </div>
                    </div>

                    <div class="tool-section" id="tileSpacingSection">
                        <label class="tool-label">平铺间距</label>
                        <div class="slider-group">
                            <input type="range" id="wmSpacing" min="50" max="400" value="150" class="cyber-slider">
                            <span id="wmSpacingVal">150px</span>
                        </div>
                    </div>

                    <div class="action-buttons">
                        <button class="cyber-btn full success" id="btnDownloadAdd">
                            <span class="btn-icon">↓</span> 下载水印图片
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 处理中遮罩 -->
    <div class="processing-overlay" id="processingOverlay" style="display:none;">
        <div class="processing-box">
            <div class="cyber-spinner"></div>
            <p class="processing-text" id="processingText">正在分析图像...</p>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <span>水印工坊 v1.0</span>
        <span class="footer-sep">|</span>
        <span>纯前端处理 · 图片不会上传到服务器</span>
    </footer>

    <script src="inpaint.js"></script>
    <script src="app.js"></script>
</body>
</html>
